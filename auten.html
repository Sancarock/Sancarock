<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN" "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml">
<head>
<meta http-equiv="Content-Type" content="text/html; charset=iso-8859-1" />
<title>Login</title>
</head>
    <style>
        /* Estilos simples para melhorar o carregamento */
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
            margin: 0;
            background-color: #f4f4f4;
        }
        form {
            max-width: 300px;
            margin: auto;
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }
        input {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border: 1px solid #ccc;
            border-radius: 5px;
        }
        button {
            width: 100%;
            padding: 10px;
            background-color: #5cb85c;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        button:hover {
            background-color: #4cae4c;
        }
    </style>
</head>
<body>
    <h2 align="center">Login</h2>
    <p align="center">User: Sancarock / Senha: Sancarock </p>
    <form id="loginForm">
        <input type="text" id="username" placeholder="User" required>
        <input type="password" id="password" placeholder="Senha" required>
        <button type="submit">Entrar</button>
    </form>

   <script src="js/script.js"></script>
	 <script>
        // Bloquear a combinação Ctrl + U
        document.addEventListener('keydown', function(event) {
            // Verifica se as teclas Ctrl e U estão pressionadas
            if (event.ctrlKey && (event.key === 'u' || event.key === 'U')) {
                event.preventDefault(); // Impede a ação padrão
                alert('A combinação Ctrl + U está desativada nesta página.'); // Mensagem corrigida
            }
        });
    </script>
</body>
</html>
